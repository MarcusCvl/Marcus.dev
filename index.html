<!DOCTYPE html>
<html lang="Pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Portifolio Virtual | Marcus Carvalho</title>
</head>
<body>
    <header>
        <a class="logo" href="#"><span class="logo-span">&lt;/&gt;</span>Marcus<span class="logo-span">.dev</span> </a>
        <nav class="navbar">
            <div class="menu-itens">
                <a class="nav-link" href="#">Sobre</a>
                <a class="nav-link" href="#">Projetos</a>
                <a class="nav-link" href="#">Tecnologias</a>
                <a class="nav-link" href="#">Contato</a>
            </div>
            <a class="download-button" href="#"><img class="btn-img"src="assets/download.png" alt="download icon">Download CV</a>
        </nav>
    </header>
    <main>
        <section class="hero">
            <div class="hero-content">
                <div class="title">
                    <p class="before-title"><span class="destaque">OLÁ, EU SOU</span></p>
                    <h1>Marcus Carvalho</h1>
                    <p class="after-title">Desenvolvedor <span class="destaque">Front-End</span> em formação</p>
                    <p class="index-text">Crio interfaces modernas,responsivas e experiencias digitais que conectam pessoas e soluções</p>
                </div>
                <div class="buttons">
                    <div class="hero-cta">
                    <a class="primary-button" href="#">Ver Projetos</a>
                    <a class="secondary-button" href="#">GitHub<img class="btn-img" src="assets/github.png" alt="github icon"></a>
                    <div class="redes">
                        <a class="btn-img"><img src="assets/instagram.png" alt="instagram"></a>
                        <a class="btn-img"><img src="assets/linkedin.png" alt="linkedin"></a>
                        <a class="btn-img"><img src="assets/email.png" alt="email"></a>
                    </div>
                </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
